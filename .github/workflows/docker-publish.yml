name: Publish Docker Image

on:
    push:
        tags:
            - "v*"
    pull_request:
        paths:
            - "dockerfile"
            - ".github/workflows/docker-publish.yml"
    workflow_dispatch:
        inputs:
            push_image:
                description: "Push image to GHCR (only works on default branch)"
                required: false
                type: boolean
                default: false

concurrency:
    group: docker-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.push_image)
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
                      type=ref,event=branch
                      type=ref,event=pr

            - name: Build image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./dockerfile
                  load: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Smoke test
              run: |
                  docker run --rm -d --name smoke-test -p 3000:3000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
                  sleep 3
                  curl --fail --retry 3 --retry-delay 2 http://localhost:3000 || (docker logs smoke-test && exit 1)
                  docker stop smoke-test

            - name: Scan image for vulnerabilities
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
                  format: table
                  exit-code: "1"
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true

            - name: Push image
              if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.push_image)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  provenance: true
                  sbom: true
                  cache-from: type=gha
