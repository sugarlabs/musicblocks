name: Run Jest Tests on PR

on:
    pull_request:
        types:
            - opened
            - synchronize

concurrency:
    group: pr-tests-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    test:
        name: Run Jest Tests
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Run Jest Tests
              id: jest
              run: npm test -- --json --outputFile=jest-results.json --forceExit
              continue-on-error: true

            - name: Upload Test Results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: jest-results-${{ github.run_id }}
                  path: jest-results.json
                  retention-days: 7

            - name: Verify Test Results
              if: always()
              id: verify
              run: |
                  if [ ! -f jest-results.json ]; then
                    echo "TESTS_PASSED=false" >> $GITHUB_OUTPUT
                    exit 1
                  fi
                  
                  TESTS_FAILED=$(jq -r '.numFailedTests' jest-results.json)
                  if [ "$TESTS_FAILED" -gt 0 ]; then
                    echo "TESTS_PASSED=false" >> $GITHUB_OUTPUT
                    exit 1
                  else
                    echo "TESTS_PASSED=true" >> $GITHUB_OUTPUT
                  fi

            - name: Comment on PR
              if: always()
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const fs = require('fs');
                      const tests_passed = '${{ steps.verify.outputs.TESTS_PASSED }}' === 'true';
                      
                      let comment_body = '';
                      if (tests_passed) {
                        comment_body = '✅ All Jest tests passed! This PR is ready to merge.';
                      } else {
                        comment_body = '❌ Some Jest tests failed. Please check the logs and fix the issues before merging.';
                      }
                      
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: comment_body
                      });
