name: Security Scans

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  security-scans:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm Audit
        run: pnpm audit --prod --audit-level=high
