name: DCO Check

on:
    pull_request_target:
        types: [opened, synchronize, reopened]

permissions:
    contents: read
    pull-requests: write
    statuses: write

jobs:
    dco:
        name: DCO
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: thenets/action-dco@v0.2
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
